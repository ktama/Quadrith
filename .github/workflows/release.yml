name: Release

# v* タグを push すると Windows インストーラ(msi/nsis)をビルドして
# GitHub Releases に下書きとして添付する。
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Quadrith ${{ github.ref_name }}"
          releaseBody: |
            下記の `*-setup.exe` をダウンロードしてインストールしてください（管理者権限は不要です）。

            > 初回起動時に Windows SmartScreen の「認識されないアプリ」警告が出ることがあります
            > （アプリが未署名のため。ウイルスではありません）。
            > その場合は「詳細情報」→「実行」で起動できます。
          releaseDraft: true
          prerelease: false
